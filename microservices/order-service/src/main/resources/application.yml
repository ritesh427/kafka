management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
      cors:
        allowed-origins: "http://localhost:5173"
        allowed-methods: GET
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_db
    username: root
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all # Balanced (use 1 for speed, all for durability)
      retries: 3
      properties:
        enable.idempotence: true
        # --- Performance Tuning Knobs ---
        
        # 1. Throughput Optimization (Batching)
        batch.size: 65536         # 64KB - larger batches mean higher throughput, more disk/network efficiency
        linger.ms: 20             # Wait up to 20ms to fill the batch
        
        # 2. Compression (CPU vs Network/Disk)
        compression.type: snappy # Good balance, very fast CPU-wise
        
        # 3. Buffer Management
        buffer.memory: 33554432  # 32MB - total memory available to the producer for buffering
        max.block.ms: 60000      # How long to wait for buffer memory to become available
        
        # 4. In-flight requests (Ordering & Concurrency)
        max.in.flight.requests.per.connection: 5 # Higher is better for throughput, but >5 can break ordering with idempotence off
    consumer:
      group-id: order-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      auto-offset-reset: earliest
      properties:
        specific.avro.reader: true
    properties:
      schema.registry.url: http://localhost:8081
