management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
      cors:
        allowed-origins: "http://localhost:5173"
        allowed-methods: GET

server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**
        - id: user-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/products/**
        - id: cart-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/cart/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
        - id: inventory-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/inventory/**
        - id: analytics-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/analytics/**
        - id: shipping-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/shipping/**

