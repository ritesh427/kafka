name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B clean install
      
    - name: Build Docker Image (Order Service)
      run: |
        docker build -t kafka-mastery/order-service:latest ./microservices/order-service
        
    - name: K8s Lint (Sample)
      run: |
        # In a real pipeline, you'd use kube-linter or similar
        echo "Linting K8s manifests..."
        ls -R k8s/
